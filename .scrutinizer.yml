build:
  nodes:
    analysis:
      tests:
        override:
          - py-scrutinizer-run

filter:
  paths:
    - "custom_components/imou_life/*"
  excluded_paths:
    - "tests/*"
    - "docs/*"
    - "config/*"
    - "tools/*"

checks:
  python:
    code_rating: true
    duplicate_code: true
    variables_undefined_variable: false

tools:
  external_code_coverage:
    timeout: 600
    runs: 3
