name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach zip to (e.g., v1.7.0)'
        required: true
        type: string

jobs:
  attach-zip:
    name: Build and Attach Zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Get integration name
        id: info
        run: |
          name=$(find custom_components/ -type d -maxdepth 1 | tail -n 1 | cut -d "/" -f2)
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Create zip file
        run: |
          cd "${{ github.workspace }}/custom_components/${{ steps.info.outputs.name }}"
          zip -r ../../${{ steps.info.outputs.name }}.zip . -x "*.pyc" -x "*__pycache__*" -x "*.git*"

      - name: Upload zip to release
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" "${{ github.workspace }}/${{ steps.info.outputs.name }}.zip" --clobber

      - name: Cleanup old CI draft releases
        if: always()
        run: |
          echo "Cleaning up CI draft releases older than 7 days..."
          CUTOFF=$(date -d '7 days ago' -u +%Y-%m-%dT%H:%M:%SZ)
          gh release list --json tagName,isDraft,createdAt | \
            jq -r ".[] | select(.isDraft == true and (.tagName | startswith(\"ci-v\")) and .createdAt < \"$CUTOFF\") | .tagName" | \
            while read -r tag; do
              echo "Deleting old CI draft: $tag"
              gh release delete "$tag" -y --cleanup-tag 2>/dev/null || true
            done
