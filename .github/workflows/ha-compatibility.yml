name: Home Assistant Compatibility Matrix

on:
  # Run on PRs that touch integration code
  pull_request:
    paths:
      - 'custom_components/imou_life/**'
      - 'config/requirements*.txt'
      - '.github/workflows/ha-compatibility.yml'
  # Run weekly to catch breaking changes in HA dev
  schedule:
    - cron: '0 6 * * 1'  # 6 AM UTC every Monday
  # Allow manual trigger
  workflow_dispatch:

jobs:
  compatibility-test:
    name: HA ${{ matrix.ha-version }} / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported version (from manifest requirement)
          - ha-version: "2024.3.3"
            python-version: "3.11"
            label: "Minimum"

          # Mid-year stable (represents typical user installations)
          - ha-version: "2024.6.4"
            python-version: "3.12"
            label: "Mid-2024"

          # Recent stable (common version)
          - ha-version: "2024.11.3"
            python-version: "3.12"
            label: "Recent"

          # Latest stable release
          - ha-version: "2024.12.5"
            python-version: "3.13"
            label: "Latest Stable"

          # Development/nightly (catch upcoming breaking changes)
          - ha-version: "dev"
            python-version: "3.14"
            label: "Development"
            allow-failure: true

    continue-on-error: ${{ matrix.allow-failure || false }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ha-${{ matrix.ha-version }}-py-${{ matrix.python-version }}-${{ hashFiles('config/requirements_test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ha-${{ matrix.ha-version }}-py-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-ha-${{ matrix.ha-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

          # Install specific HA version
          if [ "${{ matrix.ha-version }}" = "dev" ]; then
            echo "Installing Home Assistant from dev branch"
            pip install git+https://github.com/home-assistant/core.git@dev
          else
            echo "Installing Home Assistant ${{ matrix.ha-version }}"
            pip install homeassistant==${{ matrix.ha-version }}
          fi

          # Install integration requirements
          pip install imouapi==1.0.15

          # Install test dependencies (excluding homeassistant to avoid conflicts)
          grep -v "^homeassistant" config/requirements_test.txt > /tmp/requirements_test_no_ha.txt
          pip install -r /tmp/requirements_test_no_ha.txt

          # Verify installation
          python -c "from homeassistant.const import __version__; print(f'Home Assistant {__version__} installed')"

      - name: Run unit tests
        run: |
          python -m pytest \
            --asyncio-mode=auto \
            --durations=10 \
            --tb=short \
            -v \
            tests/unit/
        continue-on-error: ${{ matrix.allow-failure || false }}

      - name: Run integration tests
        run: |
          python -m pytest \
            --asyncio-mode=auto \
            --durations=10 \
            --tb=short \
            -v \
            tests/integration/
        continue-on-error: ${{ matrix.allow-failure || false }}

      - name: Test component import
        run: |
          python -c "
          import sys
          from homeassistant.const import __version__
          print(f'Python: {sys.version}')
          print(f'Home Assistant: {__version__}')

          # Test integration import
          import custom_components.imou_life
          print('✓ Integration imports successfully')

          # Test coordinator import (uses HA's DataUpdateCoordinator)
          from custom_components.imou_life.coordinator import ImouDataUpdateCoordinator
          print('✓ Coordinator imports successfully')

          # Test config flow (uses HA's config_entries)
          from custom_components.imou_life.config_flow import ImouConfigFlow
          print('✓ Config flow imports successfully')

          print('✓ All compatibility checks passed')
          "

      - name: Check for deprecated API usage
        run: |
          # Look for common deprecated HA APIs in our code
          echo "Checking for deprecated Home Assistant APIs..."

          # async_forward_entry_setup (deprecated in 2022.8, removed in future)
          if grep -r "async_forward_entry_setup" custom_components/imou_life/ 2>/dev/null; then
            echo "⚠️ WARNING: Uses deprecated async_forward_entry_setup"
          fi

          # STATE_UNKNOWN constant (check if using old import)
          if grep -r "from homeassistant.const import STATE_UNKNOWN" custom_components/imou_life/ 2>/dev/null; then
            echo "✓ STATE_UNKNOWN usage found (still valid)"
          fi

          echo "Deprecation check completed"

  # Summary job - only fails if non-dev versions fail
  compatibility-summary:
    name: Compatibility Test Summary
    runs-on: ubuntu-latest
    needs: compatibility-test
    if: always()
    steps:
      - name: Check compatibility results
        run: |
          echo "Home Assistant Compatibility Matrix completed"
          echo "Check individual job results above for details"

          # This job succeeds even if dev version fails
          # but fails if any stable version fails
          echo "✓ Compatibility testing complete"

      - name: Create compatibility report
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          cat << 'EOF' > compatibility-report.md
          ## Home Assistant Compatibility Report

          **Test Date**: $(date -u +"%Y-%m-%d %H:%M UTC")
          **Trigger**: ${{ github.event_name }}

          ### Tested Versions
          - ✓ Minimum Supported: HA 2024.3.3 / Python 3.11
          - ✓ Mid-Year: HA 2024.6.4 / Python 3.12
          - ✓ Recent: HA 2024.11.3 / Python 3.12
          - ✓ Latest Stable: HA 2024.12.5 / Python 3.13
          - ⚠️ Development: HA dev / Python 3.13 (allowed to fail)

          ### Status
          See detailed results in Actions tab.
          EOF

          cat compatibility-report.md
